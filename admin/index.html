<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Sveltia CMS</title>
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

    <script>
      CMS.init();

      CMS.registerEventListener({
        name: 'preSave',
        handler: ({ entry }) => {
          let d = entry.get('data');
          if(entry.get('newRecord')) {
            d = d.set('created', new Date().toISOString());
          }
          return d.set('changed', new Date().toISOString());
        },
      });

    </script>
  </body>
</html>
